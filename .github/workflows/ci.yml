name: Go

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    
permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: goFmt
      run: test -z "$(gofmt -l .)"

    - name: Vet
      run: go vet ./...

    - name: Build
      run: go build -v -o /tmp/redis-server ./app

    - name: Test
      run: go test -race -v ./...

